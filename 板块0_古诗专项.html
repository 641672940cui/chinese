    document.getElementById("printThemeBtn").onclick = () => { let html = "<html><head><title>主题速记</title><style>body{font-family:sans-serif;padding:20px;}</style></head><body><h2>7大主题·高频考句速记</h2>"; for(let [t, lines] of Object.entries(themeDetailed)){ html += `<h3>${t}</h3>`; lines.forEach(l => { html += `<p>${l}</p>`; }); } html += "</body></html>"; let win = window.open(); win.document.write(html); win.print(); };
    document.querySelectorAll(".tab-btn").forEach(btn => btn.addEventListener("click", () => { document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active")); btn.classList.add("active"); currentTab = btn.dataset.tab; render(); }));
    updateStatsUI(); render();
</script>
